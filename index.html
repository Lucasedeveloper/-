<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INGRED</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#1a002a,#000 70%);
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
}
.gift-screen{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background:radial-gradient(circle,#2a0040,#000 80%);
  z-index:9999;
  cursor:pointer;
  color:white;
  font-size:18px;
}
.gift{
  font-size:100px;
  animation:float 2s infinite ease-in-out;
}
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
}
.container{
  position:relative;
  width:480px;
  height:580px;
  z-index:1;
}
.heart{
  width:100%;
  height:100%;
  animation:pulse 2.5s infinite ease-in-out;
  filter:drop-shadow(0 0 40px rgba(255,0,120,.6));
}
@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.05);}
}
.content{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:290px;
  text-align:center;
  display:flex;
  flex-direction:column;
  gap:24px;
}
.text{
  color:#fff;
  font-size:15px;
  line-height:1.7;
  min-height:120px;
}
.highlight{
  font-weight:900;
  font-size:20px;
  text-shadow:0 0 12px currentColor,0 0 30px currentColor;
}
.final{
  display:flex;
  justify-content:center;
  gap:14px;
  min-height:82px;
}
.final span{
  font-size:58px;
  font-weight:900;
  opacity:0;
  transform:scale(.6);
  transition:opacity .6s ease, transform .6s ease;
}
.glow{
  animation:glow 1.4s infinite alternate;
}
@keyframes glow{
  from{filter:brightness(1);}
  to{filter:brightness(2.4);}
}
.signature{
  margin-top:25px;
  color:#00ffff;
  font-family:'Dancing Script',cursive;
  font-size:42px;
  font-weight:700;
  letter-spacing:2px;
  opacity:0;
  min-height:55px;
  transition:opacity .8s ease;
}
.signature.show{opacity:1;}
.signature span{
  display:inline-block;
  opacity:0;
  transform:translateY(10px);
  animation:signaturePop .5s forwards;
}
@keyframes signaturePop{
  to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>

<div class="gift-screen" id="giftScreen">
<div class="gift">🎁</div>
Clique para abrir
</div>

<audio id="bg-music"></audio>

<div class="container">
<svg class="heart" viewBox="0 0 512 512">
<defs>
<radialGradient id="g" cx="50%" cy="40%" r="70%">
<stop offset="0%" stop-color="#ff8fcf"/>
<stop offset="50%" stop-color="#ff2d75"/>
<stop offset="100%" stop-color="#b3003c"/>
</radialGradient>
</defs>
<path d="M256 460 C120 350,40 260,40 170 C40 90,100 50,160 50 C210 50,240 80,256 110 C272 80,302 50,352 50 C412 50,472 90,472 170 C472 260,392 350,256 460Z" fill="url(#g)"/>
</svg>

<div class="content">
<div class="text" id="typed"></div>
<div class="final" id="final"></div>
<div class="signature" id="signature"></div>
</div>
</div>

<script>

/* ===== REGISTRO GOOGLE SHEETS ===== */

const webhookURL = "https://script.google.com/macros/s/AKfycby6TfgIEkltm8yz69aKG50Kj9DKurIHgRFvRCqZHgIrno94bwhfeii6ogmTqP1LDfSY0A/exec";

const params = new URLSearchParams(window.location.search);
const pessoa = params.get("pessoa") || "desconhecido";

window.addEventListener("load", function(){
  fetch(webhookURL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify({
      pessoa:pessoa,
      navegador:navigator.userAgent,
      plataforma:navigator.platform,
      data:new Date().toLocaleString()
    })
  });
});

/* ===== MÚSICAS SEM REPETIR ===== */

const musicas=["lucas.mp3","musica2.mp3","musica3.mp3"];
let tocadas=JSON.parse(localStorage.getItem("tocadas"))||[];

function escolherMusica(){
  if(tocadas.length===musicas.length){
    tocadas=[];
  }
  let restantes=musicas.filter(m=>!tocadas.includes(m));
  let escolhida=restantes[Math.floor(Math.random()*restantes.length)];
  tocadas.push(escolhida);
  localStorage.setItem("tocadas",JSON.stringify(tocadas));
  return escolhida;
}

const audio=document.getElementById("bg-music");
audio.src=escolherMusica();
audio.loop=false;

/* ===== TEXTO ANIMADO ===== */

const texto=`Você é uma pessoa incrível.
Eu adoro o seu jeito.
Você ilumina tudo ao seu redor.`;

const typed=document.getElementById("typed");
let i=0;

function escrever(){
  if(i<texto.length){
    typed.innerHTML+=texto[i];
    i++;
    setTimeout(escrever,40);
  }else{
    mostrarFinal();
  }
}

/* ===== INGRED ANIMADO ===== */

function mostrarFinal(){
  const final=document.getElementById("final");
  const letras=["ℹ️","🆖","🟥"];
  letras.forEach((l,index)=>{
    const span=document.createElement("span");
    span.textContent=l;
    final.appendChild(span);
    setTimeout(()=>{
      span.style.opacity=1;
      span.style.transform="scale(1)";
      span.classList.add("glow");
    },index*600);
  });
  setTimeout(mostrarAssinatura,2000);
}

/* ===== ASSINATURA ===== */

function mostrarAssinatura(){
  const assinatura="Lucas";
  const div=document.getElementById("signature");
  div.classList.add("show");
  assinatura.split("").forEach((letra,index)=>{
    const span=document.createElement("span");
    span.textContent=letra;
    span.style.animationDelay=(index*0.1)+"s";
    div.appendChild(span);
  });
}

/* ===== ABRIR PRESENTE ===== */

document.getElementById("giftScreen").addEventListener("click",function(){
  this.style.display="none";
  audio.play();
  escrever();
});

</script>

</body>
</html>
